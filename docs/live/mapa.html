<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RescueGIS — Mapa en vivo · Terremoto Venezuela 2026</title>
<meta name="description" content="Mapa en vivo de daños, sucesos correlacionados y refugios — terremoto Venezuela 2026. Actualización automática cada 3 horas.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { display:flex; flex-direction:column; font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:#0b1220; color:#e2e8f0; }
  header { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#111a2e; border-bottom:1px solid #1e293b; flex-wrap:wrap; }
  header h1 { font-size:.95rem; }
  header .upd { font-size:.72rem; color:#64748b; margin-left:auto; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { border:1px solid #334155; background:#1e293b; color:#cbd5e1; border-radius:99px; padding:3px 10px; font-size:.72rem; cursor:pointer; user-select:none; }
  .chip.on { background:#2563eb; border-color:#2563eb; color:#fff; }
  #map { flex:1; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip { background:#131c30; color:#e2e8f0; }
  .pop b { font-size:.95rem; }
  .pop .l { color:#94a3b8; font-size:.75rem; }
  .pop a { color:#60a5fa; text-decoration:none; font-weight:700; display:inline-block; margin-top:6px; }
  .stats { position:absolute; bottom:14px; left:10px; z-index:1000; background:#131c30ee; border:1px solid #1e293b; border-radius:12px; padding:10px 14px; font-size:.78rem; max-width:280px; }
  .stats b { color:#fff; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; }
</style>
</head>
<body>
<header>
  <h1>🇻🇪 RescueGIS · Mapa en vivo</h1>
  <div class="chips">
    <span class="chip on" data-f="CRITICA"><span class="dot" style="background:#e11d48"></span>Crítica</span>
    <span class="chip on" data-f="ALTA"><span class="dot" style="background:#f97316"></span>Alta</span>
    <span class="chip on" data-f="MEDIA"><span class="dot" style="background:#eab308"></span>Media</span>
    <span class="chip on" data-f="BAJA"><span class="dot" style="background:#22c55e"></span>Baja</span>
    <span class="chip on" data-f="refugios">🏕 Refugios</span>
  </div>
  <span class="upd" id="upd">cargando…</span>
</header>
<div id="map"></div>
<div class="stats" id="stats">Cargando datos…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COLORES = { CRITICA:'#e11d48', ALTA:'#f97316', MEDIA:'#eab308', BAJA:'#22c55e' };
const filtros = { CRITICA:true, ALTA:true, MEDIA:true, BAJA:true, refugios:true };
let sucesos = [], refugios = [];

const map = L.map('map').setView([10.55, -66.92], 11);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap · datos: ChatMap (HOT) + RescueGIS', maxZoom: 19 }).addTo(map);
const capa = L.layerGroup().addTo(map);

function pintar() {
  capa.clearLayers();
  let visibles = 0;
  const orden = { BAJA:0, MEDIA:1, ALTA:2, CRITICA:3 };
  for (const f of sucesos.slice().sort((a,b)=>orden[a.properties.urgencia]-orden[b.properties.urgencia])) {
    const p = f.properties, [lon, lat] = f.geometry.coordinates;
    if (!filtros[p.urgencia]) continue;
    visibles++;
    const c = COLORES[p.urgencia] || '#64748b';
    if ((p.coord_precision_m||0) > 40)
      L.circle([lat,lon], { radius:p.coord_precision_m, color:c, weight:1, fillOpacity:.05, opacity:.3 }).addTo(capa);
    const r = 5 + Math.min(p.num_reportes||1, 15);   // tamaño = nº de reportes
    L.circleMarker([lat,lon], { radius:r, fillColor:c, fillOpacity:.85, color:'#0f172a', weight:1 })
      .bindPopup(`<div class="pop"><b>${p.codigo}</b> · <span style="color:${c}">${p.urgencia}</span><br>
        ${(p.tipo_dominante||'').replace(/_/g,' ')}${p.personas_max?' · 👥 '+p.personas_max:''}<br>
        <span class="l">${p.num_reportes} reporte(s) · ${p.num_fuentes} fuente(s) · confianza ${p.confianza}%<br>
        ${p.edificio||'edificio por confirmar'} · ${(p.parroquia||'').replace('Parroquia ','')}<br>
        ${p.building_match_metodo==='auto_150m'?'match firme':'±'+Math.round(p.coord_precision_m||0)+' m — confirmar en sitio'}</span><br>
        <a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}">🧭 Navegar hasta aquí</a>
        </div>`).addTo(capa);
  }
  if (filtros.refugios) for (const f of refugios) {
    const [lon, lat] = f.geometry.coordinates;
    L.marker([lat,lon], { icon: L.divIcon({ html:'🏕', className:'', iconSize:[24,24] }) })
      .bindPopup(`<div class="pop"><b>Refugio/Campamento</b><br>
        <span class="l">${f.properties.nombre||''}<br>reportado ${(f.properties.reportado_en||'').slice(0,10)}</span><br>
        <a target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}">🧭 Navegar</a></div>`)
      .addTo(capa);
  }
  const crit = sucesos.filter(f=>f.properties.urgencia==='CRITICA').length;
  const multi = sucesos.filter(f=>f.properties.num_reportes>1).length;
  document.getElementById('stats').innerHTML =
    `<b>${sucesos.length}</b> sucesos (${visibles} visibles) · <b>${crit}</b> críticos · <b>${multi}</b> corroborados<br>` +
    `🏕 <b>${refugios.length}</b> refugios · tamaño del punto = nº de reportes<br>` +
    `<span style="color:#64748b">Reportes ciudadanos sin verificación oficial — confirmar en sitio.<br>` +
    `Auto-actualizado cada 3 h · <a style="color:#60a5fa" href="brief_whatsapp.txt">parte de texto</a> · ` +
    `<a style="color:#60a5fa" href="https://github.com/luisandresg393-source/RescueGIS-LaGuaira-Caracas">código</a></span>`;
}

async function cargar() {
  try {
    const cb = '?v=' + Date.now();   // evitar cache viejo de Pages
    const [s, r] = await Promise.all([
      fetch('sucesos.geojson' + cb).then(x=>x.json()),
      fetch('refugios.geojson' + cb).then(x=>x.json()).catch(()=>({features:[]})),
    ]);
    sucesos = s.features || []; refugios = r.features || [];
    pintar();
    if (sucesos.length) {
      const g = L.featureGroup(sucesos.map(f=>L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]])));
      map.fitBounds(g.getBounds().pad(0.1));
    }
    document.getElementById('upd').textContent = 'datos cargados ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('upd').textContent = '⚠ error cargando datos';
  }
}

document.querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
  filtros[ch.dataset.f] = !filtros[ch.dataset.f];
  ch.classList.toggle('on');
  pintar();
});

cargar();
setInterval(cargar, 5*60*1000);   // re-lee los GeoJSON cada 5 min
</script>
</body>
</html>
